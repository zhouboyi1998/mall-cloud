server:
  port: 8762

spring:
  application:
    name: eureka-cluster
  profiles: node-2

eureka:
  instance:
    hostname: node-2
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone:
        - http://node-1:8761/eureka
        - http://node-3:8763/eureka
