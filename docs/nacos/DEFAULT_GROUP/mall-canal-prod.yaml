spring:
  # RabbitMQ 配置
  rabbitmq:
    host: 192.168.159.128
    port: 5672
    username: cafe
    password: cafe
    # 生产者是否确认消息成功投递到交换机: NONE 不确认; CORRELATED 异步等待回调结果; SIMPLE 同步等待回调结果
    publisher-confirm-type: CORRELATED
    # 消息无法到达队列时是否退回给生产者
    publisher-returns: true

# RocketMQ 配置
rocketmq:
  name-server: 192.168.159.128:9876
  # 生产者配置
  producer:
    # 默认生产者组
    group: ${spring.application.name}

# Canal 数据库监听配置
canal:
  host: 192.168.159.128
  port: 11111
  destination: example
  username: canal
  password: canal
  # 批处理数据量
  batch-size: 1000
