spring:
  profiles:
    active: nacos
  # 自动装配时排除以下配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# RSA 证书口令, 生成 RSA 证书文件 (jwt.jks) 时设置
rsa:
  credential:
    filename: "jwt.jks"
    alias: "jwt"
    # 密钥口令 (-keypass)
    keypass: "123456"
    # 密钥库口令 (-storepass)
    storepass: "123456"
